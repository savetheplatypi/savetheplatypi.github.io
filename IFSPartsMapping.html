function getSuggestions(parts, rels) {
  const byName = {};
  parts.forEach(p => { byName[p.name] = p; });
  return IFS_PATTERNS.reduce((acc, pat) => {
    const fp = byName[pat.from], tp = byName[pat.to];
    if (!fp || !tp) return acc;
    if (rels.some(r => r.from === fp.id && r.to === tp.id && r.type === pat.type)) return acc;
    return [...acc, { ...pat, fromId:fp.id, toId:tp.id }];
  }, []);
}

const CW = 154, CH = 78, CG = 18;
const TY = { self:44, manager:206, firefighter:328, exile:468 };
const MAPH = 610;

// Clip a line to the card edge so arrowheads land on the border, not buried inside
function cardEdge(cx, cy, tx, ty) {
  const dx = tx - cx, dy = ty - cy;
  const len = Math.sqrt(dx*dx + dy*dy) || 1;
  const ndx = dx/len, ndy = dy/len;
  const hw = CW/2 + 4, hh = CH/2 + 4;
  const sx = Math.abs(ndx) > 1e-9 ? hw / Math.abs(ndx) : Infinity;
  const sy = Math.abs(ndy) > 1e-9 ? hh / Math.abs(ndy) : Infinity;
  const s  = Math.min(sx, sy);
  return [cx + ndx * s, cy + ndy * s];
}

const LS = {

//  FIRESTORE HELPERS
// ═══════════════════════════════════════════════════════
const uCol = (uid, col) => fdb.collection('users').doc(uid).collection(col);

async function fbLoadAll(uid) {
  const [pS, rS, nS, sS] = await Promise.all([
    uCol(uid,'parts').get(),
    uCol(uid,'relationships').get(),
    uCol(uid,'partNotes').get(),
    uCol(uid,'sessions').orderBy('createdAt','desc').get(),
  ]);
  return {
    parts:    pS.docs.map(d => ({ id:d.id, ...d.data() })),
    rels:     rS.docs.map(d => ({ id:d.id, ...d.data() })),
    pnotes:   nS.docs.map(d => ({ id:d.id, ...d.data() })),
    sessions: sS.docs.map(d => ({ id:d.id, ...d.data() })),
  };
}
const fbSave   = (uid,col,id,data) => uCol(uid,col).doc(id).set(data, {merge:true});
const fbDelete = (uid,col,id)      => uCol(uid,col).doc(id).delete();
const fbSavePart    = (uid,p) => fbSave(uid,'parts',p.id,p);
const fbSaveRel     = (uid,r) => fbSave(uid,'relationships',r.id,r);
const fbSaveNote    = (uid,n) => fbSave(uid,'partNotes',n.id,n);
const fbSaveSess    = (uid,s) => fbSave(uid,'sessions',s.id,s);
const fbDeletePart  = (uid,id) => fbDelete(uid,'parts',id);
const fbDeleteRel   = (uid,id) => fbDelete(uid,'relationships',id);

//  APP

function App() {
  useEffect(() => {
    const l = document.createElement('link');
    l.href = "https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&display=swap";

  }, []);

  const [dark,       setDark]       = useState(true);
  const th                          = dark ? DK : LT;
  const [user,       setUser]       = useState(null);
  const [loading,    setLoading]    = useState(true);
  const [dbStatus,   setDbStatus]   = useState('unknown');
  const [dbError,    setDbError]    = useState('');
  const [view,       setView]       = useState('library');
  const [isMobile,   setIsMobile]   = useState(() => window.innerWidth < 768);
  const [sidebarOpen,setSidebarOpen]= useState(false);
  const [parts,      setParts]      = useState(() => LS.get('ifs_p') || [DEFAULT_SELF]);
  const [rels,       setRels]       = useState(() => LS.get('ifs_r') || []);
  const [pnotes,     setPnotes]     = useState(() => LS.get('ifs_n') || []);
  const [sessions,   setSessions]   = useState(() => LS.get('ifs_s') || []);
  const [selId,      setSelId]      = useState(null);

  useEffect(() => {
    const onResize = () => setIsMobile(window.innerWidth < 768);
    window.addEventListener('resize', onResize);
    return () => window.removeEventListener('resize', onResize);
  }, []);

  useEffect(() => { LS.set('ifs_p', parts);    }, [parts]);
  useEffect(() => { LS.set('ifs_r', rels);     }, [rels]);
  useEffect(() => { LS.set('ifs_n', pnotes);   }, [pnotes]);
  useEffect(() => { LS.set('ifs_s', sessions); }, [sessions]);

  const loadUserData = useCallback(async uid => {
    setDbStatus('syncing');
    try {
      const data = await fbLoadAll(uid);
      if (data.parts.length > 0) {
        setParts(data.parts);
      } else {
        const localParts = LS.get('ifs_p') || [DEFAULT_SELF];
        for (const p of localParts) await fbSavePart(uid, p);
      }
      if (data.rels.length     > 0) setRels(data.rels);
      if (data.pnotes.length   > 0) setPnotes(data.pnotes);
      if (data.sessions.length > 0) setSessions(data.sessions);
      setDbStatus('ok');
    } catch (err) {
      console.error('Firebase load error:', err);
      setDbError(err.message || String(err));
      setDbStatus('error');
    }
  }, []);

  // Handle redirect sign-in result + auth state
  useEffect(() => {
    auth.getRedirectResult().catch(err => console.error('Redirect error:', err));
    const unsub = auth.onAuthStateChanged(u => {
      setUser(u);
      if (u) loadUserData(u.uid);
      else setDbStatus('unknown');
      setLoading(false);
    });
    return () => unsub();
  }, [loadUserData]);

  const nextX = useCallback(type => {
    const same = parts.filter(p => p.type === type);
    return 30 + same.length * (CW + CG);
  }, [parts]);

  const addPart = useCallback(data => {
    const np = { id:Date.now().toString(), posX:nextX(data.type), createdAt:new Date().toISOString(), ...data };
    setParts(p => [...p, np]);
    if (user) fbSavePart(user.uid, np).catch(console.error);
    return np;
  }, [nextX, user]);

  const updPart = useCallback((id, u) => {
    setParts(p => {
      const next = p.map(x => x.id === id ? { ...x, ...u } : x);
      const updated = next.find(x => x.id === id);
      if (user && updated) fbSavePart(user.uid, updated).catch(console.error);
      return next;
    });
  }, [user]);

  const delPart = useCallback(id => {
    setParts(p => p.filter(x => x.id !== id));
    setRels(r => r.filter(x => x.from !== id && x.to !== id));
    setPnotes(n => n.filter(x => x.partId !== id));
    if (selId === id) setSelId(null);
    if (user) {
      fbDeletePart(user.uid, id).catch(console.error);
      rels.filter(r => r.from === id || r.to === id)
          .forEach(r => fbDeleteRel(user.uid, r.id).catch(console.error));
    }
  }, [selId, user, rels]);

  const addRel = useCallback(rel => {
    const nr = { id:Date.now().toString(), ...rel };
    setRels(r => [...r, nr]);
    if (user) fbSaveRel(user.uid, nr).catch(console.error);
  }, [user]);

  const delRel = useCallback(id => {
    setRels(r => r.filter(x => x.id !== id));
    if (user) fbDeleteRel(user.uid, id).catch(console.error);
  }, [user]);

  const addNote = useCallback((pid, content, ntype='insight') => {
    const nn = { id:Date.now().toString(), partId:pid, content, ntype, createdAt:new Date().toISOString() };
    setPnotes(n => [...n, nn]);
    if (user) fbSaveNote(user.uid, nn).catch(console.error);
  }, [user]);

  const addSess = useCallback(data => {
    const ns = { id:Date.now().toString(), createdAt:new Date().toISOString(), ...data };
    setSessions(s => [ns, ...s]);
    if (user) fbSaveSess(user.uid, ns).catch(console.error);
  }, [user]);

  const updSess = useCallback((id, u) => {
    setSessions(s => {
      const next = s.map(x => x.id === id ? { ...x, ...u } : x);
      const updated = next.find(x => x.id === id);
      if (user && updated) fbSaveSess(user.uid, updated).catch(console.error);
      return next;
    });
  }, [user]);

  const selPart  = parts.find(p => p.id === selId);
  const selNotes = pnotes.filter(n => n.partId === selId);

  if (loading) return <LoadingScreen th={th} />;
  if (!user)   return <AuthScreen th={th} dark={dark} setDark={setDark} />;

  const statusBanner = {
    error:   { msg:`⚠ Could not connect to Firebase — working offline. ${dbError ? 'Error: '+dbError : ''}`, bg:'#c96c4218', border:'#c96c4266', color:'#c96c42' },
    syncing: { msg:'↻ Syncing…', bg:'transparent', border:'transparent', color:th.muted },
  }[dbStatus];

  const closeSidebar = () => setSidebarOpen(false);

  return (
    <div style={{ display:'flex', height:'100vh', overflow:'hidden', background:th.bg, color:th.text, fontFamily:"'DM Sans',sans-serif", fontSize:14, flexDirection:'column' }}>
      {statusBanner && (
        <div style={{ background:statusBanner.bg, borderBottom:`1px solid ${statusBanner.border}`, padding:'7px 20px', fontSize:12, color:statusBanner.color, flexShrink:0 }}>
          {statusBanner.msg}
        </div>
      )}
      {isMobile && (
        <div style={{ display:'flex', alignItems:'center', padding:'10px 16px', background:th.panel, borderBottom:`1px solid ${th.border}`, flexShrink:0 }}>
          <button onClick={() => setSidebarOpen(true)} style={{ ...BS('none', th.text), fontSize:22, lineHeight:1, padding:'0 14px 0 0' }}>☰</button>
          <span style={{ fontFamily:"'Cormorant Garamond',serif", fontSize:19, color:th.self, fontWeight:600, flex:1 }}>Inner Compass</span>
          <span style={{ fontSize:10, color:dbStatus==='ok'?'#4caf50':dbStatus==='error'?'#c96c42':th.muted }}>●</span>
        </div>
      )}
      {isMobile && sidebarOpen && (
        <div onClick={closeSidebar} style={{ position:'fixed', inset:0, background:'rgba(0,0,0,0.55)', zIndex:98 }} />
      )}
      <div style={{ flex:1, overflow:'hidden', display:'flex', position:'relative' }}>
        <Sidebar view={view} setView={setView} dark={dark} setDark={setDark} th={th}
          parts={parts} user={user} dbStatus={dbStatus}
          isMobile={isMobile} sidebarOpen={sidebarOpen} onClose={closeSidebar} />
        <div style={{ flex:1, overflow:'hidden', display:'flex' }}>
          {view==='library'  && <LibraryView parts={parts} onAdd={addPart} th={th} />}
          {view==='map'      && <MapView parts={parts} rels={rels} selId={selId} onSel={setSelId}
            onMove={(id,x)=>updPart(id,{posX:x})} onAdd={addPart} onAddRel={addRel} onDelRel={delRel} th={th} />}
          {view==='sessions' && <SessionsView sessions={sessions} parts={parts} onAdd={addSess} onUpd={updSess} th={th} />}
          {view==='settings' && <SettingsView parts={parts} rels={rels} pnotes={pnotes} sessions={sessions}
            onImport={d=>{setParts(d.parts||[]);setRels(d.rels||[]);setPnotes(d.pnotes||[]);setSessions(d.sessions||[]);}}
            th={th} user={user} dbStatus={dbStatus} />}
        </div>
        {selPart && (
          <PartDrawer part={selPart} notes={selNotes} parts={parts} rels={rels}
            onClose={()=>setSelId(null)} onUpd={u=>updPart(selId,u)}
            onNote={(c,t)=>addNote(selId,c,t)} onDel={()=>delPart(selId)}
            onDelRel={delRel} onSel={setSelId} th={th} isMobile={isMobile} />
        )}
      </div>
    </div>
  );
}

function LoadingScreen({ th }) {
  return (

// ═══════════════════════════════════════════════════════
//  MAP VIEW  — edge-clipped arrows, hover tooltips, touch drag
// ═══════════════════════════════════════════════════════
function MapView({ parts, rels, selId, onSel, onMove, onAdd, onAddRel, onDelRel, th }) {
  const [relMode,      setRelMode]      = useState(null);
  const [relFrom,      setRelFrom]      = useState(null);
  const [relType,      setRelType]      = useState('protects');
  const [mapW,         setMapW]         = useState(1000);
  const [showWalkthru, setShowWalkthru] = useState(false);
  const [hoveredRel,   setHoveredRel]   = useState(null);
  const [tooltipPos,   setTooltipPos]   = useState({ x:0, y:0 });
  const suggestions = getSuggestions(parts, rels);

  useEffect(() => {
    const max = parts.reduce((m,p) => Math.max(m,(p.posX||0)+CW+60), 800);
    setMapW(max);
  }, [parts]);

  const handleCardClick = id => {
    if (relMode==='pick-first') { setRelFrom(id); setRelMode('pick-second'); }
    else if (relMode==='pick-second' && relFrom && id!==relFrom) {
      onAddRel({ from:relFrom, to:id, type:relType });
      setRelMode(null); setRelFrom(null);
    } else { onSel(selId===id ? null : id); }
  };

  // ── Drag (mouse + touch) ──────────────────────────────
  const drag = useRef({ active:false, id:null, startX:0, startPosX:0, moved:false });

  const handleMouseDown = (e, part) => {
    e.preventDefault();
    drag.current = { active:true, id:part.id, startX:e.clientX, startPosX:part.posX||0, moved:false };
  };
  const handleTouchStart = (e, part) => {
    const t = e.touches[0];
    drag.current = { active:true, id:part.id, startX:t.clientX, startPosX:part.posX||0, moved:false };
  };
  const handleTouchEnd = (e, part) => {
    if (!drag.current.moved) handleCardClick(part.id);
    drag.current.active = false;
    drag.current.moved  = false;
  };

  useEffect(() => {
    const mv = e => {
      const d = drag.current; if (!d.active) return;
      d.moved = true;
      onMove(d.id, Math.max(10, d.startPosX+(e.clientX-d.startX)));
    };
    const tmv = e => {
      const d = drag.current; if (!d.active) return;
      const t = e.touches[0];
      if (Math.abs(t.clientX-d.startX) > 5) {
        d.moved = true;
        e.preventDefault();
        onMove(d.id, Math.max(10, d.startPosX+(t.clientX-d.startX)));
      }
    };
    const up = () => { drag.current.active = false; };
    window.addEventListener('mousemove', mv);
    window.addEventListener('mouseup',   up);
    window.addEventListener('touchmove', tmv, { passive:false });
    window.addEventListener('touchend',  up);
    return () => {
      window.removeEventListener('mousemove', mv);
      window.removeEventListener('mouseup',   up);
      window.removeEventListener('touchmove', tmv);
      window.removeEventListener('touchend',  up);
    };
  }, [onMove]);

  const tiers = [
    { type:'self',        label:'✦  Self',     y:TY.self        },
    { type:'manager',     label:'Managers',     y:TY.manager     },
    { type:'firefighter', label:'Firefighters', y:TY.firefighter },
    { type:'exile',       label:'Exiles',       y:TY.exile       },
  ];

  const handleNewPart = () => {
    const name = window.prompt('Part name:'); if (!name) return;
    const type = (window.prompt('Type:\n  manager\n  firefighter\n  exile')||'manager').toLowerCase().trim();
    if (!['manager','firefighter','exile'].includes(type)) return;
    onAdd({ name, type, em:'●', desc:'', isCustom:true });
  };

  // Build pair groups for parallel-arrow offset
  const pairGroups = {};
  rels.forEach(rel => {
    const key = [rel.from, rel.to].sort().join('|');
    if (!pairGroups[key]) pairGroups[key] = [];
    pairGroups[key].push(rel.id);
  });

  // Hovered relationship data for tooltip
  const hovRel  = rels.find(r => r.id === hoveredRel);
  const hovFrom = hovRel && parts.find(p => p.id === hovRel.from);
  const hovTo   = hovRel && parts.find(p => p.id === hovRel.to);
  const hovRm   = hovRel && (REL.find(r => r.v === hovRel.type) || REL[0]);
  const hovPat  = hovRel && IFS_PATTERNS.find(pat => {
    const pf = parts.find(p => p.name === pat.from);
    const pt = parts.find(p => p.name === pat.to);
    return pf?.id === hovRel.from && pt?.id === hovRel.to && pat.type === hovRel.type;
  });

  return (
    <div style={{ flex:1, display:'flex', flexDirection:'column', overflow:'hidden' }}>
      {/* Toolbar */}
      <div style={{ display:'flex', alignItems:'center', gap:10, padding:'11px 18px',
        borderBottom:`1px solid ${th.border}`, background:th.panel, flexShrink:0, flexWrap:'wrap' }}>
        <span style={{ fontFamily:"'Cormorant Garamond',serif", fontSize:18, color:th.text, fontWeight:500 }}>Parts Map</span>
        <div style={{ flex:1 }} />
        {relMode ? (
          <div style={{ display:'flex', alignItems:'center', gap:10, background:th.subtle, padding:'6px 14px', borderRadius:8, border:`1px solid ${th.border}` }}>
            <span style={{ fontSize:12, color:th.muted }}>{relMode==='pick-first'?'① Click source part':'② Click target part'}</span>
            <select value={relType} onChange={e=>setRelType(e.target.value)} style={{ ...IS(th), padding:'4px 8px', fontSize:11, width:130 }}>
              {REL.map(r => <option key={r.v} value={r.v}>{r.l}</option>)}
            </select>
            <button onClick={() => { setRelMode(null); setRelFrom(null); }}
              style={{ ...BS(th.faint, th.muted), padding:'4px 10px', fontSize:11 }}>Cancel</button>
          </div>
        ) : (
          <>
            <button onClick={() => setRelMode('pick-first')}
              style={{ ...BS(th.subtle, th.text), padding:'7px 13px', fontSize:12, border:`1px solid ${th.border}` }}>
              + Relationship
            </button>
            <button onClick={handleNewPart}
              style={{ ...BS(th.subtle, th.text), padding:'7px 13px', fontSize:12, border:`1px solid ${th.border}` }}>
              + Part
            </button>
            <button onClick={() => setShowWalkthru(true)} title="Learn how IFS parts relate"
              style={{ ...BS(th.subtle, th.self), padding:'7px 11px', fontSize:13, border:`1px solid ${th.border}` }}>?</button>
          </>
        )}
      </div>

      {/* Canvas */}
      <div style={{ flex:1, overflowX:'auto', overflowY:'auto', position:'relative' }}>
        <div style={{ position:'relative', width:mapW, height:MAPH+60, minWidth:'100%' }}>

          {/* Tier labels + dividers */}
          {tiers.map((tier, i) => (
            <div key={tier.type}>
              {i>0 && <div style={{ position:'absolute', left:0, right:0, top:tier.y-20, height:1, background:th.faint, opacity:0.6 }} />}
              <div style={{ position:'absolute', left:12, top:tier.y-18 }}>
                <span style={{ fontSize:10, fontWeight:600, color:tc(tier.type,th), letterSpacing:'0.1em', textTransform:'uppercase', opacity:0.8 }}>{tier.label}</span>
              </div>
            </div>
          ))}

          {/* SVG arrows — edge-clipped, offset for parallel pairs */}
          <svg
            style={{ position:'absolute', top:0, left:0, width:'100%', height:'100%', pointerEvents:'none', overflow:'visible' }}
            onMouseMove={e => {
              const rect = e.currentTarget.getBoundingClientRect();
              setTooltipPos({ x: e.clientX - rect.left + 14, y: e.clientY - rect.top - 36 });
            }}
          >
            <defs>
              {REL.map(r => (
                <marker key={r.v} id={`arr-${r.v}`} markerWidth="8" markerHeight="8" refX="7" refY="3" orient="auto">
                  <path d="M0,0 L0,6 L8,3 z" fill={r.c} opacity="0.9" />
                </marker>
              ))}
            </defs>

            {rels.map(rel => {
              const fp = parts.find(p => p.id === rel.from);
              const tp = parts.find(p => p.id === rel.to);
              if (!fp || !tp) return null;

              const scx = (fp.posX||0) + CW/2, scy = TY[fp.type] + CH/2;
              const ecx = (tp.posX||0) + CW/2, ecy = TY[tp.type] + CH/2;

              // Lateral offset for parallel arrows between same pair
              const pairKey = [rel.from, rel.to].sort().join('|');
              const group   = pairGroups[pairKey] || [rel.id];
              const gIdx    = group.indexOf(rel.id);
              const gCount  = group.length;
              const latPx   = gCount > 1 ? (gIdx - (gCount-1)/2) * 52 : 0;
              const len     = Math.sqrt((ecx-scx)**2+(ecy-scy)**2) || 1;
              const ox      = (-(ecy-scy)/len) * latPx;
              const oy      = ((ecx-scx)/len)  * latPx;

              // Offset centers
              const sx = scx + ox, sy = scy + oy;
              const ex = ecx + ox, ey = ecy + oy;

              // Clip to card edges so arrowhead lands on border
              const [ax, ay] = cardEdge(scx+ox, scy+oy, ecx+ox, ecy+oy);
              const [bx, by] = cardEdge(ecx+ox, ecy+oy, scx+ox, scy+oy);

              const dx = ex-sx, dy = ey-sy;
              const vert = Math.abs(dy) >= Math.abs(dx);
              const cp1x = (vert ? sx : sx+dx*0.4) + ox*0;
              const cp1y = (vert ? sy+dy*0.4 : sy) + oy*0;
              const cp2x = (vert ? ex : ex-dx*0.4) + ox*0;
              const cp2y = (vert ? ey-dy*0.4 : ey) + oy*0;
              const lx = (ax+bx)/2, ly = (ay+by)/2;
              const rm = REL.find(r => r.v === rel.type) || REL[0];
              const isHov = hoveredRel === rel.id;

              return (
                <g key={rel.id} style={{ pointerEvents:'all' }}>
                  {/* Wide invisible hit area */}
                  <path d={`M${ax},${ay} C${cp1x},${cp1y} ${cp2x},${cp2y} ${bx},${by}`}
                    fill="none" stroke="transparent" strokeWidth="14"
                    onMouseEnter={() => setHoveredRel(rel.id)}
                    onMouseLeave={() => setHoveredRel(null)} />
                  {/* Visible line */}
                  <path d={`M${ax},${ay} C${cp1x},${cp1y} ${cp2x},${cp2y} ${bx},${by}`}
                    fill="none" stroke={rm.c} strokeWidth={isHov ? 2.5 : 1.5}
                    opacity={isHov ? 0.9 : 0.55}
                    strokeDasharray={rel.type==='aware_of'?'5,4':undefined}
                    markerEnd={`url(#arr-${rel.type})`} />
                  {/* Label pill */}
                  <rect x={lx-30} y={ly-9} width={60} height={16} rx={4} fill={th.bg} opacity="0.88" />
                  <text x={lx} y={ly+4} fill={rm.c} fontSize="9.5" textAnchor="middle"
                    opacity="0.9" fontFamily="'DM Sans',sans-serif" fontWeight="500">{rm.l}</text>
                </g>
              );
            })}
          </svg>

          {/* Hover tooltip */}
          {hovRel && hovFrom && hovTo && (
            <div style={{ position:'absolute', left:Math.min(tooltipPos.x, mapW-280),
              top:Math.max(tooltipPos.y, 4), zIndex:50, pointerEvents:'none',
              background:th.card, border:`1.5px solid ${hovRm.c}`, borderRadius:10,
              padding:'10px 14px', maxWidth:268, boxShadow:'0 4px 20px rgba(0,0,0,0.3)' }}>
              <div style={{ fontSize:12, fontWeight:600, color:hovRm.c, marginBottom:hovPat?6:0 }}>
                {hovFrom.name} → {hovRm.l.toLowerCase()} → {hovTo.name}
              </div>
              {hovPat && <p style={{ margin:0, fontSize:12, color:th.muted, lineHeight:1.65 }}>{hovPat.note}</p>}
            </div>
          )}

          {/* Part cards */}
          {parts.map(part => {
            const isFrom = relFrom === part.id;
            const isSel  = selId   === part.id;
            const color  = tc(part.type, th);
            const glow   = isSel || isFrom;
            return (
              <div key={part.id}
                onMouseDown={e => handleMouseDown(e, part)}
                onClick={() => { if (!drag.current.moved) handleCardClick(part.id); }}
                onTouchStart={e => handleTouchStart(e, part)}
                onTouchEnd={e => handleTouchEnd(e, part)}
                style={{ position:'absolute', left:part.posX||0, top:TY[part.type],
                  width:CW, height:CH, cursor:'pointer', userSelect:'none', touchAction:'none',
                  borderRadius:10, border:`1.5px solid ${glow?color:th.border}`,
                  background:glow ? color+'1a' : th.card,
                  boxShadow:isSel ? `0 0 0 3px ${color}30` : 'none',
                  transition:'border-color 0.1s,background 0.1s,box-shadow 0.1s',
                  display:'flex', flexDirection:'column', justifyContent:'center',
                  padding:'9px 12px', zIndex:isSel?3:1 }}>
                <div style={{ display:'flex', alignItems:'center', gap:7 }}>
                  <span style={{ fontSize:17, flexShrink:0 }}>{part.em||'●'}</span>
                  <span style={{ fontSize:12.5, fontWeight:500, color:th.text,
                    overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap', flex:1, lineHeight:1.25 }}>
                    {part.name}
                  </span>
                </div>
                {part.tag && <div style={{ fontSize:10, color:th.muted, marginTop:3, overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap' }}>{part.tag}</div>}
                <div style={{ display:'flex', alignItems:'center', gap:5, marginTop:4 }}>
                  <div style={{ fontSize:9.5, color, fontWeight:600, textTransform:'uppercase', letterSpacing:'0.08em' }}>{part.type}</div>
                  {part.isLegacy && <span style={{ fontSize:9, background:'#8a6a9a33', color:'#c09adc', padding:'1px 5px', borderRadius:4, fontWeight:600 }}>LEGACY</span>}
                </div>
              </div>
            );
          })}
        </div>
      </div>

      {/* Suggestions panel */}
      {suggestions.length > 0 && (
        <SuggestionsPanel suggestions={suggestions} parts={parts} onAddRel={onAddRel} th={th} />
      )}

      {/* Walkthrough modal */}
      {showWalkthru && <WalkthroughModal onClose={() => setShowWalkthru(false)} th={th} />}

      {/* Legend */}
      <div style={{ display:'flex', gap:18, padding:'8px 18px', borderTop:`1px solid ${th.border}`,
        background:th.panel, flexShrink:0, flexWrap:'wrap', alignItems:'center' }}>
        <span style={{ fontSize:10, color:th.muted, letterSpacing:'0.06em', textTransform:'uppercase', fontWeight:500 }}>Relationships</span>
        {REL.map(r => (
          <div key={r.v} style={{ display:'flex', alignItems:'center', gap:6, fontSize:11, color:th.muted }}>
            <svg width="22" height="10" style={{ overflow:'visible' }}>
              <line x1="0" y1="5" x2="18" y2="5" stroke={r.c} strokeWidth="1.5" opacity="0.8"
                strokeDasharray={r.v==='aware_of'?'4,3':undefined} />
              <polygon points="18,2 18,8 22,5" fill={r.c} opacity="0.8" />
            </svg>
            {r.l}
          </div>
        ))}
        <span style={{ fontSize:10, color:th.muted, marginLeft:'auto' }}>Drag cards · Hover lines</span>
      </div>
    </div>
  );
}

// ═══════════════════════════════════════════════════════
//  PART DRAWER  — legacy burden only for custom parts
// ═══════════════════════════════════════════════════════
function PartDrawer({ part, notes, parts, rels, onClose, onUpd, onNote, onDel, onDelRel, onSel, th, isMobile }) {
  const [tab,      setTab]      = useState('details');
  const [editing,  setEditing]  = useState(false);
  const [form,     setForm]     = useState({});
  const [noteText, setNoteText] = useState('');
  const [noteType, setNoteType] = useState('insight');
  const [confirm,  setConfirm]  = useState(false);

  useEffect(() => {
    setForm({ name:part.name, em:part.em||'', desc:part.desc||'',
      formation:part.formation||'', burden:part.burden||'', tag:part.tag||'',
      isLegacy:part.isLegacy||false, ancestry:part.ancestry||'' });
    setEditing(false); setConfirm(false);
  }, [part.id]);

  const color     = tc(part.type, th);
  const connected = rels.filter(r => r.from===part.id || r.to===part.id);
  const handleNote = () => { if (!noteText.trim()) return; onNote(noteText, noteType); setNoteText(''); };

  // Legacy burden toggle visible only for custom parts or parts that already have it set
  const isCustomPart = part.isCustom || !LIB.some(l => l.name === part.name);
  const showLegacy   = (isCustomPart || part.isLegacy) && part.type !== 'self';

  return (
    <div style={{ width: isMobile?'100%':336,
      position:isMobile?'fixed':'relative', inset:isMobile?0:'auto', zIndex:isMobile?100:'auto',
      background:th.panel, borderLeft:`1px solid ${th.border}`,
      display:'flex', flexDirection:'column', overflow:'hidden', flexShrink:0 }}>

      {/* Header */}
      <div style={{ padding:'18px 18px 14px', borderBottom:`1px solid ${th.border}` }}>
        <div style={{ display:'flex', justifyContent:'space-between', alignItems:'flex-start', gap:8 }}>
          <div style={{ display:'flex', gap:10, alignItems:'center', flex:1, minWidth:0 }}>
            {editing
              ? <input value={form.em} onChange={e=>setForm(f=>({...f,em:e.target.value}))} style={{ ...IS(th), width:46, textAlign:'center', fontSize:20 }} />
              : <span style={{ fontSize:26, flexShrink:0 }}>{part.em||'●'}</span>
            }
            <div style={{ flex:1, minWidth:0 }}>
              {editing
                ? <input value={form.name} onChange={e=>setForm(f=>({...f,name:e.target.value}))}
                    style={{ ...IS(th), fontFamily:"'Cormorant Garamond',serif", fontSize:17, fontWeight:600, width:'100%' }} />
                : <div style={{ fontFamily:"'Cormorant Garamond',serif", fontSize:20, fontWeight:600, color:th.text, lineHeight:1.2, overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap' }}>
                    {part.name}
                  </div>
              }
              <div style={{ fontSize:10.5, color, textTransform:'uppercase', letterSpacing:'0.09em', marginTop:3, fontWeight:600 }}>{part.type}</div>
            </div>
          </div>
          <button onClick={onClose} style={{ ...BS('none',th.muted), border:'none', fontSize:18, padding:'2px 4px', lineHeight:1, flexShrink:0 }}>✕</button>
        </div>
        {editing ? (
          <>
            <input value={form.tag} onChange={e=>setForm(f=>({...f,tag:e.target.value}))} placeholder="Short tagline…"
              style={{ ...IS(th), width:'100%', marginTop:10, fontSize:12, boxSizing:'border-box' }} />
            <div style={{ display:'flex', gap:7, marginTop:10 }}>
              <button onClick={() => { onUpd({...form}); setEditing(false); }} style={{ ...BS(color,th.bg), padding:'6px 16px', fontSize:12 }}>Save</button>
              <button onClick={() => setEditing(false)} style={{ ...BS(th.faint,th.muted), padding:'6px 12px', fontSize:12 }}>Cancel</button>
            </div>
          </>
        ) : (
          <>
            {part.tag && <div style={{ fontSize:11.5, color:th.muted, marginTop:6, fontStyle:'italic' }}>{part.tag}</div>}
            <div style={{ display:'flex', gap:7, marginTop:12 }}>
              <button onClick={() => setEditing(true)} style={{ ...BS(th.subtle,th.text), padding:'5px 12px', fontSize:11, border:`1px solid ${th.border}` }}>Edit</button>
              {!confirm
                ? <button onClick={() => setConfirm(true)} style={{ ...BS(th.subtle,th.muted), padding:'5px 12px', fontSize:11, border:`1px solid ${th.border}` }}>Delete</button>
                : <button onClick={onDel} style={{ ...BS('#c96c4222','#c96c42'), padding:'5px 12px', fontSize:11, border:'1px solid #c96c42' }}>Confirm delete</button>
              }
            </div>
          </>
        )}
      </div>

      {/* Tabs */}
      <div style={{ display:'flex', borderBottom:`1px solid ${th.border}`, flexShrink:0 }}>
        {['details','notes','connections'].map(t => (
          <button key={t} onClick={() => setTab(t)}
            style={{ flex:1, padding:'9px 4px', fontSize:11.5, background:'none', border:'none', cursor:'pointer',
              color:tab===t?th.text:th.muted,
              borderBottom:tab===t?`2px solid ${color}`:'2px solid transparent',
              fontFamily:"'DM Sans',sans-serif", textTransform:'capitalize', fontWeight:tab===t?500:400 }}>
            {t}
            {t==='notes' && notes.length>0 && <span style={{ marginLeft:5, fontSize:10, background:color+'33', color, padding:'1px 6px', borderRadius:10 }}>{notes.length}</span>}
            {t==='connections' && connected.length>0 && <span style={{ marginLeft:5, fontSize:10, background:color+'33', color, padding:'1px 6px', borderRadius:10 }}>{connected.length}</span>}
          </button>
        ))}
      </div>

      {/* Tab content */}
      <div style={{ flex:1, overflowY:'auto', padding:18 }}>

        {tab==='details' && (
          <div style={{ display:'flex', flexDirection:'column', gap:18 }}>
            {[
              { key:'desc',      label:'Description',     placeholder:'How does this part show up? What does it do?' },
              ...(part.type!=='self' ? [
                { key:'formation', label:'Formation Memory', placeholder:'When did this part first appear? What was happening?' },
                { key:'burden',    label:'Core Burden',      placeholder:'What belief or painful emotion does this part carry?' },
              ] : []),
            ].map(f => (
              <div key={f.key}>
                <div style={{ fontSize:10.5, fontWeight:600, color:th.muted, textTransform:'uppercase', letterSpacing:'0.09em', marginBottom:8 }}>{f.label}</div>
                {editing
                  ? <textarea value={form[f.key]} onChange={e=>setForm(fm=>({...fm,[f.key]:e.target.value}))}
                      rows={3} placeholder={f.placeholder} style={{ ...IS(th), width:'100%', resize:'vertical', boxSizing:'border-box' }} />
                  : <p style={{ margin:0, color:th.muted, fontSize:13, lineHeight:1.75 }}>{part[f.key] || <em>Not yet recorded.</em>}</p>
                }
              </div>
            ))}

            {/* Legacy burden — custom parts only */}
            {showLegacy && (
              <div style={{ borderTop:`1px solid ${th.border}`, paddingTop:16 }}>
                <div style={{ display:'flex', alignItems:'flex-start', justifyContent:'space-between', gap:12 }}>
                  <div style={{ flex:1 }}>
                    <div style={{ fontSize:10.5, fontWeight:600, color:'#c09adc', textTransform:'uppercase', letterSpacing:'0.09em', marginBottom:4 }}>Legacy Burden</div>
                    <p style={{ margin:0, fontSize:12, color:th.muted, lineHeight:1.65 }}>
                      A burden inherited from ancestors, family systems, or cultural trauma — not from direct personal experience.
                    </p>
                  </div>
                  <div onClick={() => editing ? setForm(f=>({...f,isLegacy:!f.isLegacy})) : onUpd({isLegacy:!part.isLegacy})}
                    style={{ width:34, height:20, borderRadius:10, position:'relative', cursor:'pointer', flexShrink:0, marginTop:2,
                      background:(editing?form.isLegacy:part.isLegacy)?'#8a6a9a':th.faint, transition:'background 0.2s' }}>
                    <div style={{ position:'absolute', top:3, left:(editing?form.isLegacy:part.isLegacy)?17:3, width:14, height:14, borderRadius:'50%', background:'white', transition:'left 0.2s' }} />
                  </div>
                </div>
                {(editing?form.isLegacy:part.isLegacy) && (
                  <div style={{ marginTop:12 }}>
                    <div style={{ fontSize:10.5, fontWeight:600, color:th.muted, textTransform:'uppercase', letterSpacing:'0.09em', marginBottom:8 }}>Ancestral / Cultural Origin</div>
                    {editing
                      ? <textarea value={form.ancestry||''} onChange={e=>setForm(fm=>({...fm,ancestry:e.target.value}))}
                          rows={2} placeholder="Where might this burden have come from?"
                          style={{ ...IS(th), width:'100%', resize:'vertical', boxSizing:'border-box' }} />
                      : <p style={{ margin:0, color:th.muted, fontSize:13, lineHeight:1.75 }}>{part.ancestry || <em>Not yet explored.</em>}</p>
                    }
                  </div>
                )}
              </div>
            )}

            <div style={{ fontSize:11, color:th.faint }}>{part.createdAt && `Added ${new Date(part.createdAt).toLocaleDateString()}`}</div>
          </div>
        )}

        {tab==='notes' && (
          <div>
            <textarea value={noteText} onChange={e=>setNoteText(e.target.value)} rows={3}
              placeholder="Add a note, insight, or record of unburdening…"
              style={{ ...IS(th), width:'100%', resize:'vertical', marginBottom:8, boxSizing:'border-box' }} />
            <div style={{ display:'flex', gap:8, marginBottom:20 }}>
              <select value={noteType} onChange={e=>setNoteType(e.target.value)} style={{ ...IS(th), flex:1 }}>
                <option value="insight">Insight</option>
                <option value="unburdening">Unburdening</option>
                {showLegacy && <option value="legacy_unburdening">Legacy Unburdening</option>}
                <option value="session">Session note</option>
                <option value="update">Update</option>
              </select>
              <button onClick={handleNote} style={{ ...BS(color,th.bg), padding:'8px 14px', fontSize:12 }}>Save</button>
            </div>
            <div style={{ display:'flex', flexDirection:'column', gap:10 }}>
              {notes.length===0 && <p style={{ color:th.muted, fontSize:13, fontStyle:'italic' }}>No notes yet.</p>}
              {[...notes].reverse().map(n => (
                <div key={n.id} style={{ background:th.subtle, borderRadius:8, padding:12 }}>
                  <div style={{ display:'flex', justifyContent:'space-between', marginBottom:6 }}>
                    <span style={{ fontSize:9.5, color:n.ntype==='legacy_unburdening'?'#c09adc':color, textTransform:'uppercase', letterSpacing:'0.08em', fontWeight:600 }}>
                      {n.ntype.replace('_',' ')}
                    </span>
                    <span style={{ fontSize:10, color:th.muted }}>{new Date(n.createdAt).toLocaleDateString()}</span>
                  </div>
                  <p style={{ margin:0, fontSize:13, color:th.text, lineHeight:1.7 }}>{n.content}</p>
                </div>
              ))}
            </div>
          </div>
        )}

        {tab==='connections' && (
          <div>
            {connected.length===0 && <p style={{ color:th.muted, fontSize:13, lineHeight:1.7, fontStyle:'italic' }}>No relationships yet. Use the Map toolbar to add connections.</p>}
            {connected.map(rel => {
              const isFrom  = rel.from===part.id;
              const otherId = isFrom ? rel.to : rel.from;
              const other   = parts.find(p => p.id===otherId);
              if (!other) return null;
              const rm = REL.find(r => r.v===rel.type) || REL[0];
              return (
                <div key={rel.id} style={{ display:'flex', alignItems:'center', justifyContent:'space-between', padding:'10px 12px', marginBottom:8, background:th.subtle, borderRadius:8 }}>
                  <div style={{ flex:1, minWidth:0 }}>
                    <div style={{ fontSize:11, color:th.muted, marginBottom:4, lineHeight:1.5 }}>
                      <span style={{ color:th.text }}>{isFrom?part.name:other.name}</span>
                      {' → '}<span style={{ color:rm.c, fontWeight:500 }}>{rm.l.toLowerCase()}</span>{' → '}
                      <span style={{ color:th.text }}>{isFrom?other.name:part.name}</span>
                    </div>
                    <button onClick={() => onSel(otherId)}
                      style={{ fontSize:12, color:tc(other.type,th), background:'none', border:'none', cursor:'pointer', padding:0, textDecoration:'underline' }}>
                      {other.em} {other.name}
                    </button>
                  </div>
                  <button onClick={() => onDelRel(rel.id)} style={{ ...BS('none',th.muted), border:'none', fontSize:15, padding:'2px 6px', lineHeight:1, flexShrink:0 }}>✕</button>
                </div>
              );
            })}
          </div>
        )}
      </div>
    </div>
  );
}

// ═══════════════════════════════════════════════════════
//  SESSIONS VIEW
// ═══════════════════════════════════════════════════════
function SessionsView({ sessions, parts, onAdd, onUpd, th }) {
  const [showNew, setShowNew] = useState(false);
  const [openId,  setOpenId]  = useState(null);
  const [form,    setForm]    = useState({ title:'', date:new Date().toISOString().slice(0,10), content:'', partsWorked:[] });
  const isMob = window.innerWidth < 768;
  const togglePart = id => setForm(f => ({ ...f, partsWorked:f.partsWorked.includes(id)?f.partsWorked.filter(x=>x!==id):[...f.partsWorked,id] }));
  const handleAdd = () => {
    if (!form.title.trim()) return;
    onAdd(form);
    setForm({ title:'', date:new Date().toISOString().slice(0,10), content:'', partsWorked:[] });
    setShowNew(false);
  };
  return (
    <div style={{ flex:1, overflowY:'auto', padding:isMob?'20px 16px':'34px 44px' }}>
      <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:28 }}>
        <h1 style={{ fontFamily:"'Cormorant Garamond',serif", fontSize:36, fontWeight:600, margin:0, color:th.text }}>Session Notes</h1>
        <button onClick={() => setShowNew(s=>!s)}
          style={{ ...BS(showNew?th.self:th.subtle, showNew?th.bg:th.text), padding:'9px 18px', border:`1px solid ${showNew?th.self:th.border}`, fontWeight:500 }}>
          {showNew?'Cancel':'+ New Session'}
        </button>
      </div>
      {showNew && (
        <div style={{ background:th.card, border:`1px solid ${th.border}`, borderRadius:12, padding:20, marginBottom:22 }}>
          <div style={{ display:'flex', gap:10, marginBottom:10, flexWrap:'wrap' }}>
            <input value={form.title} onChange={e=>setForm(f=>({...f,title:e.target.value}))} placeholder="Session title"
              style={{ ...IS(th), flex:1, minWidth:200 }} />
            <input type="date" value={form.date} onChange={e=>setForm(f=>({...f,date:e.target.value}))}
              style={{ ...IS(th), width:160 }} />
          </div>
          <textarea value={form.content} onChange={e=>setForm(f=>({...f,content:e.target.value}))}
            rows={5} placeholder="Notes, insights, what came up, what shifted…"
            style={{ ...IS(th), width:'100%', resize:'vertical', marginBottom:12, boxSizing:'border-box' }} />
          <div style={{ marginBottom:14 }}>
            <div style={{ fontSize:11, color:th.muted, marginBottom:8, fontWeight:500, textTransform:'uppercase', letterSpacing:'0.07em' }}>Parts worked with</div>
            <div style={{ display:'flex', flexWrap:'wrap', gap:6 }}>
              {parts.filter(p=>p.type!=='self').map(p => {
                const on = form.partsWorked.includes(p.id);
                return (
                  <button key={p.id} onClick={() => togglePart(p.id)}
                    style={{ padding:'4px 12px', borderRadius:20, fontSize:11, cursor:'pointer',
                      background:on?tc(p.type,th)+'22':th.subtle, color:on?tc(p.type,th):th.muted,
                      border:`1px solid ${on?tc(p.type,th)+'88':th.border}`, fontFamily:"'DM Sans',sans-serif" }}>
                    {p.em} {p.name}
                  </button>
                );
              })}
            </div>
          </div>
          <div style={{ display:'flex', gap:8 }}>
            <button onClick={handleAdd} style={{ ...BS(th.self,th.bg), padding:'8px 20px' }}>Save Session</button>
            <button onClick={() => setShowNew(false)} style={{ ...BS(th.faint,th.muted), padding:'8px 14px' }}>Cancel</button>
          </div>
        </div>
      )}
      {sessions.length===0 && !showNew && (
        <div style={{ textAlign:'center', padding:'70px 0', color:th.muted }}>
          <div style={{ fontSize:34, marginBottom:14 }}>📓</div>
          <p>No sessions recorded yet.</p>
        </div>
      )}
      <div style={{ display:'flex', flexDirection:'column', gap:10 }}>
        {sessions.map(sess => (
          <div key={sess.id} style={{ background:th.card, border:`1px solid ${th.border}`, borderRadius:12, overflow:'hidden' }}>
            <div onClick={() => setOpenId(openId===sess.id?null:sess.id)}
              style={{ display:'flex', alignItems:'center', justifyContent:'space-between', padding:'15px 18px', cursor:'pointer' }}>
              <div>
                <div style={{ fontWeight:500, color:th.text, fontSize:14 }}>{sess.title}</div>
                <div style={{ fontSize:11, color:th.muted, marginTop:3 }}>
                  {new Date(sess.date||sess.createdAt).toLocaleDateString('en-US',{ weekday:'long', year:'numeric', month:'long', day:'numeric' })}
                </div>
              </div>
              <div style={{ display:'flex', alignItems:'center', gap:12 }}>
                {sess.partsWorked?.length>0 && <span style={{ fontSize:11, color:th.muted }}>{sess.partsWorked.length} parts</span>}
                <span style={{ color:th.muted, fontSize:14 }}>{openId===sess.id?'▲':'▼'}</span>
              </div>
            </div>
            {openId===sess.id && (
              <div style={{ padding:'0 18px 18px', borderTop:`1px solid ${th.border}` }}>
                {sess.partsWorked?.length>0 && (
                  <div style={{ display:'flex', flexWrap:'wrap', gap:6, margin:'14px 0 12px' }}>
                    {sess.partsWorked.map(pid => {
                      const p = parts.find(x=>x.id===pid); if (!p) return null;
                      return <span key={pid} style={{ padding:'3px 10px', borderRadius:20, fontSize:11, background:tc(p.type,th)+'22', color:tc(p.type,th), border:`1px solid ${tc(p.type,th)}44` }}>{p.em} {p.name}</span>;
                    })}
                  </div>
                )}
                <p style={{ margin:0, fontSize:13, color:th.muted, lineHeight:1.8, whiteSpace:'pre-wrap' }}>{sess.content||'No notes recorded.'}</p>
              </div>
            )}
          </div>
        ))}
      </div>
    </div>
  );
}

// ═══════════════════════════════════════════════════════
//  SETTINGS VIEW  — Firebase setup guide
// ═══════════════════════════════════════════════════════
function SettingsView({ parts, rels, pnotes, sessions, onImport, th, user, dbStatus }) {
  const [token,  setToken]  = useState(() => LS.get('ifs_tok')||null);
  const [copied, setCopied] = useState(false);
  const isMob = window.innerWidth < 768;
  const genToken = () => { const t=Math.random().toString(36).substr(2,14); setToken(t); LS.set('ifs_tok',t); };
  const copy = text => { navigator.clipboard?.writeText(text); setCopied(true); setTimeout(()=>setCopied(false),2000); };
  const exportData = () => {
    const blob = new Blob([JSON.stringify({parts,rels,pnotes,sessions},null,2)],{type:'application/json'});
    const a = Object.assign(document.createElement('a'),{href:URL.createObjectURL(blob),download:'ifs-map.json'});
    a.click(); URL.revokeObjectURL(a.href);
  };
  const importData = () => {
    const input = Object.assign(document.createElement('input'),{type:'file',accept:'.json'});
    input.onchange = e => {
      const file = e.target.files[0]; if (!file) return;
      const r = new FileReader();
      r.onload = ev => { try { onImport(JSON.parse(ev.target.result)); } catch { alert('Invalid JSON file.'); } };
      r.readAsText(file);
    };
    input.click();
  };
  return (
    <div style={{ flex:1, overflowY:'auto', padding:isMob?'20px 16px':'34px 44px' }}>
      <h1 style={{ fontFamily:"'Cormorant Garamond',serif", fontSize:36, fontWeight:600, margin:'0 0 30px', color:th.text }}>Settings</h1>

      <Sec title="Firebase Setup" th={th}>
        <p style={{ fontSize:13, color:th.muted, lineHeight:1.75, marginBottom:16 }}>
          To enable data sync, paste your Firebase project config at the top of <code style={{ color:th.self }}>index.html</code>, then complete these steps once:
        </p>
        <ol style={{ fontSize:13, color:th.muted, lineHeight:2.1, paddingLeft:20, margin:'0 0 14px' }}>
          <li>Go to <a href="https://console.firebase.google.com" target="_blank" rel="noreferrer" style={{ color:th.self }}>console.firebase.google.com</a> → create a project</li>
          <li><strong style={{ color:th.text }}>Build → Firestore Database</strong> → Create database → Start in production mode</li>
          <li><strong style={{ color:th.text }}>Authentication → Sign-in method</strong> → Enable Google</li>
          <li><strong style={{ color:th.text }}>Authentication → Settings → Authorized domains</strong> → add your GitHub Pages URL</li>
          <li><strong style={{ color:th.text }}>Project Settings → Your apps</strong> → add a web app → copy the config object</li>
          <li>Paste the config into the <code style={{ color:th.self }}>FIREBASE_CONFIG</code> at the top of index.html</li>
          <li><strong style={{ color:th.text }}>Firestore → Rules</strong> → paste and publish the rules below</li>
        </ol>
        <div style={{ background:th.subtle, borderRadius:8, padding:'12px 14px', fontFamily:'monospace', fontSize:11, color:th.text, lineHeight:1.8, overflowX:'auto', whiteSpace:'pre' }}>{`rules_version = '2';
service cloud.firestore {
  match /databases/{database}/documents {
    match /users/{userId}/{document=**} {
      allow read, write: if request.auth != null
                         && request.auth.uid == userId;
    }
  }
}`}</div>
      </Sec>

      <Sec title="Share with Therapist" th={th}>
        <p style={{ fontSize:13, color:th.muted, lineHeight:1.75, marginBottom:16 }}>
          Generate a token to share your map. Your therapist opens your GitHub Pages URL with <code style={{ color:th.self }}>?token=…</code> appended.
        </p>
        {token && <div style={{ background:th.subtle, borderRadius:8, padding:'10px 14px', marginBottom:12, fontFamily:'monospace', fontSize:11.5, color:th.text, wordBreak:'break-all' }}>{token}</div>}
        <div style={{ display:'flex', gap:8, flexWrap:'wrap' }}>
          <button onClick={genToken} style={{ ...BS(th.subtle,th.text), padding:'8px 16px', fontSize:12, border:`1px solid ${th.border}` }}>
            {token?'Regenerate':'Generate'} Token
          </button>
          {token && (
            <button onClick={() => copy(window.location.origin+window.location.pathname+'?token='+token)}
              style={{ ...BS(th.self,th.bg), padding:'8px 16px', fontSize:12 }}>
              {copied?'Copied! ✓':'Copy Share Link'}
            </button>
          )}
        </div>
      </Sec>

      <Sec title="Export & Import" th={th}>
        <p style={{ fontSize:13, color:th.muted, lineHeight:1.75, marginBottom:16 }}>Export your complete map as JSON for backup or migration.</p>
        <div style={{ display:'flex', gap:8 }}>
          <button onClick={exportData} style={{ ...BS(th.subtle,th.text), padding:'8px 16px', fontSize:12, border:`1px solid ${th.border}` }}>Export JSON</button>
          <button onClick={importData} style={{ ...BS(th.subtle,th.text), padding:'8px 16px', fontSize:12, border:`1px solid ${th.border}` }}>Import JSON</button>
        </div>
      </Sec>

      <Sec title="Stats" th={th}>
        <div style={{ display:'grid', gridTemplateColumns:'repeat(auto-fill,minmax(110px,1fr))', gap:12, marginBottom:14 }}>
          {[{l:'Parts',v:parts.length},{l:'Connections',v:rels.length},{l:'Notes',v:pnotes.length},{l:'Sessions',v:sessions.length}].map(s => (
            <div key={s.l} style={{ background:th.subtle, borderRadius:8, padding:'14px 16px', textAlign:'center' }}>
              <div style={{ fontFamily:"'Cormorant Garamond',serif", fontSize:30, color:th.self, fontWeight:600, lineHeight:1 }}>{s.v}</div>
              <div style={{ fontSize:11, color:th.muted, marginTop:4 }}>{s.l}</div>
            </div>
          ))}
        </div>
        <div style={{ display:'flex', alignItems:'center', gap:8, fontSize:12, color:th.muted }}>
          <span style={{ fontSize:10, color:dbStatus==='ok'?'#4caf50':dbStatus==='error'?'#c96c42':th.muted }}>●</span>
          <span>Cloud sync: {{ ok:'Active — saving to Firebase automatically', error:'Offline — data saved locally', syncing:'Syncing…', unknown:'Not connected' }[dbStatus]}</span>
        </div>
      </Sec>
    </div>
  );
}

// ═══════════════════════════════════════════════════════
//  SUGGESTIONS PANEL
// ═══════════════════════════════════════════════════════
function SuggestionsPanel({ suggestions, parts, onAddRel, th }) {
  const [dismissed, setDismissed] = useState(new Set());
  const [expanded,  setExpanded]  = useState(false);
  const visible = suggestions.filter(s => !dismissed.has(`${s.fromId}|${s.toId}|${s.type}`));
  if (visible.length === 0) return null;
  const shown = expanded ? visible : visible.slice(0, 3);
  const connect = s => {
    onAddRel({ from:s.fromId, to:s.toId, type:s.type });
    setDismissed(d => new Set([...d, `${s.fromId}|${s.toId}|${s.type}`]));
  };
  const dismiss = s => setDismissed(d => new Set([...d, `${s.fromId}|${s.toId}|${s.type}`]));
  return (
    <div style={{ background:th.subtle, borderTop:`1px solid ${th.border}`, padding:'10px 18px', flexShrink:0 }}>
      <div style={{ display:'flex', alignItems:'center', gap:8, marginBottom:8 }}>
        <span style={{ fontSize:13, color:th.self }}>💡</span>
        <span style={{ fontSize:11, color:th.muted, fontWeight:500, flex:1 }}>
          {visible.length} suggested connection{visible.length!==1?'s':''} based on your parts
        </span>
        {visible.length > 3 && (
          <button onClick={() => setExpanded(e=>!e)} style={{ ...BS('none',th.muted), fontSize:11, padding:0 }}>
            {expanded?'Show less':`Show all ${visible.length}`}
          </button>
        )}
      </div>
      <div style={{ display:'flex', gap:7, flexWrap:'wrap' }}>
        {shown.map(s => {
          const rm = REL.find(r => r.v===s.type) || REL[0];
          const key = `${s.fromId}|${s.toId}|${s.type}`;
          return (
            <div key={key} style={{ background:th.card, border:`1px solid ${th.border}`, borderRadius:8, padding:'6px 10px', display:'flex', alignItems:'center', gap:8 }}>
              <div style={{ minWidth:0 }}>
                <div style={{ fontSize:11, color:th.text, whiteSpace:'nowrap', overflow:'hidden', textOverflow:'ellipsis', maxWidth:240 }}>
                  <span style={{ color:th.muted }}>{s.from}</span>
                  <span style={{ color:rm.c, margin:'0 4px' }}>→ {rm.l.toLowerCase()} →</span>
                  <span style={{ color:th.muted }}>{s.to}</span>
                </div>
                <div style={{ fontSize:10, color:th.muted, marginTop:2, fontStyle:'italic', maxWidth:240, overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap' }}>{s.note}</div>
              </div>
              <button onClick={() => connect(s)} style={{ ...BS(rm.c+'22',rm.c), padding:'4px 10px', fontSize:11, border:`1px solid ${rm.c}55`, flexShrink:0 }}>Connect</button>
              <button onClick={() => dismiss(s)} style={{ ...BS('none',th.faint), fontSize:14, padding:'0 2px', border:'none', flexShrink:0 }}>✕</button>
            </div>
          );
        })}
      </div>
    </div>
  );
}

// ═══════════════════════════════════════════════════════

function MkArrow({ id, color }) {
  return <marker id={id} markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto"><path d="M0,0 L0,6 L6,3 z" fill={color} opacity="0.8" /></marker>;
}
function MiniCircle({ x, y, em, label, color, r=28 }) {
  return (
    <g>
      <circle cx={x} cy={y} r={r} fill={color+'20'} stroke={color} strokeWidth="1.5" />
      <text x={x} y={y+1} textAnchor="middle" dominantBaseline="middle" fontSize={r>22?16:14}>{em}</text>
      <text x={x} y={y+r+10} textAnchor="middle" fontSize="9" fill={color} fontFamily="'DM Sans',sans-serif" fontWeight="600">{label}</text>
    </g>
  );
}

function WalkthroughModal({ onClose, th }) {
  const [step, setStep] = useState(0);
  const steps = [
    { title:"You contain multitudes",        diagram:<DiagramBasic th={th}/>,   body:"Internal Family Systems sees the mind as containing many sub-personalities — called parts — each trying to protect you in its own way. Rather than problems to fix, every part has good intentions, even when its behavior causes harm." },
    { title:"Exiles: where old pain lives",   diagram:<DiagramExile th={th}/>,   body:"Some parts carry the weight of past experiences — moments of hurt, shame, abandonment, or helplessness. These are Exiles. They hold the original wounds, often frozen in time from when they first formed, and they long to be seen and healed." },
    { title:"Managers: keeping the lid on",   diagram:<DiagramManager th={th}/>, body:"To protect you from Exile pain resurfacing, Manager parts work proactively — through perfectionism, self-criticism, control, people-pleasing, or overthinking. Their intention is good: keep things stable so the old pain stays buried." },
    { title:"Firefighters: emergency response",diagram:<DiagramFF th={th}/>,    body:"When Exiles push through despite the Managers, Firefighter parts react fast and without negotiation — numbing, raging, dissociating, or chasing intensity — anything to extinguish the emotional fire, even if it causes damage." },
    { title:"Self: your core presence",       diagram:<DiagramFull th={th}/>,   body:"Beneath all the parts is Self — not another part, but your fundamental nature: calm, curious, compassionate, and connected. The goal of IFS isn't to eliminate parts, but to help Self build a relationship with each one so they can finally rest." },
  ];
  const s = steps[step];
  return (
    <div style={{ position:'fixed', inset:0, background:'rgba(0,0,0,0.72)', zIndex:200, display:'flex', alignItems:'center', justifyContent:'center', padding:16 }}
      onClick={e => { if (e.target===e.currentTarget) onClose(); }}>
      <div style={{ background:th.card, borderRadius:16, maxWidth:520, width:'100%', border:`1px solid ${th.border}`, overflow:'hidden', display:'flex', flexDirection:'column' }}>
        <div style={{ height:3, background:th.faint }}><div style={{ height:'100%', background:th.self, transition:'width 0.3s', width:`${((step+1)/steps.length)*100}%` }} /></div>
        <div style={{ background:th.subtle, display:'flex', justifyContent:'center', alignItems:'center', padding:'20px 0' }}>{s.diagram}</div>
        <div style={{ padding:'22px 26px', flex:1 }}>
          <div style={{ fontSize:10.5, color:th.muted, textTransform:'uppercase', letterSpacing:'0.1em', marginBottom:8 }}>{step+1} of {steps.length}</div>
          <h2 style={{ fontFamily:"'Cormorant Garamond',serif", fontSize:26, fontWeight:600, color:th.text, margin:'0 0 10px', lineHeight:1.2 }}>{s.title}</h2>
          <p style={{ color:th.muted, fontSize:13.5, lineHeight:1.78, margin:0 }}>{s.body}</p>
        </div>
        <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', padding:'14px 26px', borderTop:`1px solid ${th.border}` }}>
          <button onClick={() => step>0?setStep(s=>s-1):onClose()} style={{ ...BS(th.subtle,th.muted), padding:'8px 16px', border:`1px solid ${th.border}` }}>
            {step===0?'Close':'← Back'}
          </button>
          <div style={{ display:'flex', gap:7 }}>
            {steps.map((_,i) => <div key={i} onClick={() => setStep(i)} style={{ width:7, height:7, borderRadius:'50%', cursor:'pointer', background:i===step?th.self:th.faint, transition:'background 0.2s' }} />)}
          </div>
          {step<steps.length-1
            ? <button onClick={() => setStep(s=>s+1)} style={{ ...BS(th.self,th.bg), padding:'8px 18px' }}>Next →</button>
            : <button onClick={onClose}               style={{ ...BS(th.self,th.bg), padding:'8px 18px' }}>Start mapping</button>
          }
        </div>
      </div>
    </div>
  );
}
